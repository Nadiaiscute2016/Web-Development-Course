<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Details File</title>
</head>
<body>
    <h1>Personal Details File</h1>
    <form>
        <label>Name</label><br>
        <input type="text" id="name"><br><br>
        <label>Email ID</label><br>
        <input type="text" id="email"><br><br>
        <label>Contact Number(This will be hidden)</label><br>
        <input type="password" id="contact"><br><br>
        <label>Gender</label><br>
        <input type="radio" id="female" name="gender" value="female">Female<br><br>
        <input type="radio" id="male" name="gender" value="male">Male<br><br>
        <label>Favorite City</label><br>
        <input type="checkbox" id="city" value="New York">New York<br><br>
        <input type="checkbox" id="city" value="Paris">Paris<br><br>
        <input type="checkbox" id="city" value="Tokyo">Tokyo<br><br>
        <input type="checkbox" id="city" value="Sydney">Sydney<br><br>
        <input type="checkbox" id="city" value="Madrid">Madrid<br><br>
        <input type="checkbox" id="city" value="Rome">Rome<br><br>
        <input type="checkbox" id="city" value="Dubai">Dubai<br><br>
        <input type="checkbox" id="city" value="Singapore">Singapore<br><br>
        <input type="submit">
    </form>
</body>
</html>
