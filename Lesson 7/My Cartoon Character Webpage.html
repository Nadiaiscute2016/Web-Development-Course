<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cartoon Character Card</title>
    <style>
        body {
            background-color: #fff0f5;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .character-card {
            background-color: #ffffff;
            border: 4px solid #e60026;
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        h1 {
            color: #00509d;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #333333;
            font-size: 16px;
            line-height: 1.5;
        }
        .bold-text {
            font-weight: bold;
            color: #e60026;
        }
    </style>
</head>
<body>

    <div class="character-card">
        <h1>Marinette Dupain-Cheng</h1>
        <p style="color: #ff69b4; font-style: italic;">Just a normal girl with a normal life!</p>
        <p class="bold-text">Secret Identity: Ladybug</p>
        <p>She is an aspiring fashion designer in Paris who protects the city from villains alongside Cat Noir.</p>
    </div>

</body>
</html>
