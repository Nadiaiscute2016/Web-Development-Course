<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App Homepage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-card">
        <div class="weather-icon">☀️</div>

        <h1>Kigali</h1>
        <h2>27°C</h2>
        <p>Sunny Day</p>
    </div>

    <div class="forecast">
        <h2>Weekly Forecast</h2>

        <div class="days">
            <div class="day">
                <p>Mon</p>
                <span>☀️</span>
                <p>28°C</p>
            </div>

            <div class="day">
                <p>Tue</p>
                <span>🌤️</span>
                <p>26°C</p>
            </div>

            <div class="day">
                <p>Wed</p>
                <span>🌧️</span>
                <p>22°C</p>
            </div>

            <div class="day">
                <p>Thu</p>
                <span>⛅</span>
                <p>25°C</p>
            </div>

            <div class="day">
                <p>Fri</p>
                <span>☀️</span>
                <p>29°C</p>
            </div>
        </div>
    </div>

</body>
</html>
