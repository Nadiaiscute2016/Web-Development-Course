<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Superhero Card</title>
    <style>
        body {
            background-color: #eba6ee;
            color:rgb(240, 226, 226);
            font-family: Arial, sans-serif;
        }
        .hero-name {
            color: #ef1b07;
            font-weight: bold;
            color:#ef1b07;
            text-shadow: 3px 3px #f3ebeb;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .tagline {
            color: #f90202;
            font-style: italic;
            color:#ef1b07;
            text-transform: capitalize;
        }
        .label {
            color: #ff0000;
            text-transform: uppercase;
            text-decoration: underline;

        }
        .superpower
        {font-weight: bold;
            color: #ff0000;
        }
        .weakness{text-decoration: line-through;
            color:gray;
        }
        .badge{font: size 28px;
            font-weight: bold;
        color:gold;
        transform:rotate(10deg);
        }
       .made-by{color:coral;
        font-style:italic;
        }
    </style>
</head>
<body>
<h1 class="hero-name">Ladybug</h1>
<p class="tagline">Just a normal girl with a normal life!</p>
<h2 class="label">Superpowers</h2>
<p class="superpower">She can create a random object.</p>
<p class="superpower">She can reverse any damage done by a villain.</p>
<h2 class="label">Weaknesses</h2>
<p class="weakness">She stammers a lot when talking to unfamiliar people.</p>
<p class="weakness">She is a bit clumsy.</p>
<p class="badge">One of the most powerful heroes!</p>
<p class="made-by">Made by Oji Nadia Oluchi Anne</p>
</body>
</html>
